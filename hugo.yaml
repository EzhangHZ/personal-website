baseURL: 'https://ezhanghz.github.io/personal-website/'
languageCode: 'en-us'
title: "Haoruo Zhang's Personal Website"
theme: "PaperMod"
paginate: 5

# builddrafts: true # For local testing only

menu:
  main:
    - identifier: about
      name: About
      url: /about/
      weight: 10
    - identifier: cv
      name: CV/Resume
      url: /resume/
      weight: 20
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 30
    # - identifier: example
    #   name: example.org
    #   url: https://example.org
    #   weight: 40
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 80
    - identifier: search
      name: Search
      url: /search/
      weigt: 90
    - identifier: archives
      name: Archives
      url: /archives/
      weight: 100


params:
  keywords: [Blog, Portfolio, Resume, CV]
  author: Haoruo Zhang
  DateFormat: "January 2, 2006"
  defaultTheme: auto
  ShowCodeCopyButtons: true

  homeInfoParams:
    Title: Haoruo Zhang
    Content: |
      1st year CSE Master, UC San Diego

      - CS Bachelor of Arts, UC Berkeley

  socialIcons: # optional
    - name: github
      url: "https://github.com/EzhangHZ"
    # - name: "<platform 2>"
    #   url: "<link2>"
    
  # for search
  # https://fusejs.io/api/options.html
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]


outputs:
  home:
    - HTML
    - RSS
    - JSON # is necessary
