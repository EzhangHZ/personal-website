baseURL: 'http://example.org/'
languageCode: 'en-us'
title: "Haoruo Zhang's Personal Website"
theme: "PaperMod"

builddrafts: true

menu:
    main:
        - identifier: about
          name: About
          url: /about/
          weight: 10
        - identifier: cv
          name: CV/Resume
          url: /resume/
          weight: 20
        - identifier: news
          name: News
          url: /news/
          weight: 30
        - identifier: example
          name: example.org
          url: https://example.org
          weight: 40
        - identifier: search
          name: Search
          url: /search/
          weigt: 90
        - identifier: archives
          name: Archives
          url: /archives/
          weight: 100


params:
  # defaultTheme: light
  # defaultTheme: dark
  defaultTheme: auto # to switch between dark or light according to browser theme

  disableThemeToggle: false

  homeInfoParams:
        Title: Haoruo Zhang
        Content: 1st year gradutae, UC San Diego

  socialIcons: # optional
      - name: "Github"
        url: "https://github.com/EzhangHZ"
      # - name: "<platform 2>"
      #   url: "<link2>"

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]


outputs:
  home:
    - HTML
    - RSS
    - JSON # is necessary
